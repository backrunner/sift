name: Sift
options:
  bundleIdPrefix: com.alkinum.sift
  developmentLanguage: zh-Hans
  deploymentTarget:
    iOS: "18.0"
settings:
  SWIFT_VERSION: "6.0"
  GENERATE_INFOPLIST_FILE: YES
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: "9"
  SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
  TARGETED_DEVICE_FAMILY: "1"
  SUPPORTS_MACCATALYST: NO
  SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
targets:
  MessageFilterCore:
    type: framework
    platform: iOS
    sources:
      - Sources/MessageFilterCore
      - path: Privacy/MessageFilterCore/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      CODE_SIGN_IDENTITY: Apple Development
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: PB8H83VL3Z
      PRODUCT_BUNDLE_IDENTIFIER: com.alkinum.sift.MessageFilterCore
      PROVISIONING_PROFILE_SPECIFIER: ""
  SiftAppKit:
    type: framework
    platform: iOS
    sources:
      - Sources/SiftAppKit
      - path: Privacy/SiftAppKit/PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - target: MessageFilterCore
    settings:
      CODE_SIGN_IDENTITY: Apple Development
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: PB8H83VL3Z
      PRODUCT_BUNDLE_IDENTIFIER: com.alkinum.sift.SiftAppKit
      PROVISIONING_PROFILE_SPECIFIER: ""
  MessageFilterExtensionKit:
    type: framework
    platform: iOS
    sources:
      - Sources/MessageFilterExtensionKit
    dependencies:
      - target: MessageFilterCore
    settings:
      CODE_SIGN_IDENTITY: Apple Development
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: PB8H83VL3Z
      PRODUCT_BUNDLE_IDENTIFIER: com.alkinum.sift.MessageFilterExtensionKit
      PROVISIONING_PROFILE_SPECIFIER: ""
  SiftApp:
    type: application
    platform: iOS
    sources:
      - SiftApp
      - path: SiftApp/Localizable.xcstrings
        buildPhase: resources
      - path: Privacy/SiftApp/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: GeneratedModels/SiftSMSClassifier.mlmodel
        optional: true
      - path: GeneratedModels/SiftSMSClassifier.manifest.json
        buildPhase: resources
        optional: true
      - path: GeneratedModels/SiftPIIDetector.mlpackage
        optional: true
      - path: GeneratedModels/SiftPIIDetector.vocab.txt
        buildPhase: resources
        optional: true
      - path: GeneratedModels/SiftPIIDetector.manifest.json
        buildPhase: resources
        optional: true
    dependencies:
      - target: SiftAppKit
      - target: MessageFilterCore
        embed: true
      - target: MessageFilterExtensionKit
        embed: true
      - target: MessageFilterExtension
        embed: true
    settings:
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: PB8H83VL3Z
      PROVISIONING_PROFILE_SPECIFIER: ""
      CODE_SIGN_ENTITLEMENTS: SiftApp/SiftApp.entitlements
      PRODUCT_BUNDLE_IDENTIFIER: com.alkinum.sift
      TARGETED_DEVICE_FAMILY: "1"
      GENERATE_INFOPLIST_FILE: NO
      INFOPLIST_FILE: SiftApp/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      SIFT_SIGNAL_MODEL_CHANNEL_URL: https://sift.alkinum.io/models/channels/v2/SiftSignalModel.channel.json
      SIFT_SIGNAL_MODEL_PUBLIC_KEY_ID: release-2026
      SIFT_SIGNAL_MODEL_PUBLIC_KEY: "EWT4wUWJG73N72DqkoNZ8MoDZYlYWPN7YrkL6QgjQKY="
  MessageFilterExtension:
    type: app-extension
    platform: iOS
    sources:
      - MessageFilterExtension
      - path: GeneratedModels/SiftSMSClassifier.mlmodel
        optional: true
      - path: GeneratedModels/SiftSMSClassifier.manifest.json
        buildPhase: resources
        optional: true
    dependencies:
      - target: MessageFilterCore
      - target: MessageFilterExtensionKit
    settings:
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: PB8H83VL3Z
      PROVISIONING_PROFILE_SPECIFIER: ""
      CODE_SIGN_ENTITLEMENTS: MessageFilterExtension/MessageFilterExtension.entitlements
      PRODUCT_BUNDLE_IDENTIFIER: com.alkinum.sift.MessageFilterExtension
      TARGETED_DEVICE_FAMILY: "1"
      GENERATE_INFOPLIST_FILE: NO
      INFOPLIST_FILE: MessageFilterExtension/Info.plist
  TransformerDeviceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DeviceTests
    dependencies:
      - target: SiftApp
      - target: MessageFilterCore
      - target: MessageFilterExtensionKit
    settings:
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: PB8H83VL3Z
      PROVISIONING_PROFILE_SPECIFIER: ""
      PRODUCT_BUNDLE_IDENTIFIER: com.alkinum.sift.TransformerDeviceTests
      GENERATE_INFOPLIST_FILE: YES
schemes:
  SiftApp:
    build:
      targets:
        SiftApp: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
  TransformerDeviceTests:
    build:
      targets:
        SiftApp: all
        TransformerDeviceTests:
          - test
    test:
      config: Release
      environmentVariables:
        SIFT_DEVICE_BENCHMARK_HOST: "1"
      targets:
        - TransformerDeviceTests
