name: Sift
options:
  bundleIdPrefix: com.alkinum.sift
  developmentLanguage: zh-Hans
  deploymentTarget:
    iOS: "18.0"
settings:
  SWIFT_VERSION: "6.0"
  GENERATE_INFOPLIST_FILE: YES
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  MessageFilterCore:
    type: framework
    platform: iOS
    sources:
      - Sources/MessageFilterCore
      - path: Privacy/MessageFilterCore/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.alkinum.sift.MessageFilterCore
  SiftAppKit:
    type: framework
    platform: iOS
    sources:
      - Sources/SiftAppKit
      - path: Privacy/SiftAppKit/PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - target: MessageFilterCore
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.alkinum.sift.SiftAppKit
  MessageFilterExtensionKit:
    type: framework
    platform: iOS
    sources:
      - Sources/MessageFilterExtensionKit
    dependencies:
      - target: MessageFilterCore
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.alkinum.sift.MessageFilterExtensionKit
  SiftApp:
    type: application
    platform: iOS
    sources:
      - SiftApp
      - path: SiftApp/Localizable.xcstrings
        buildPhase: resources
      - path: Privacy/SiftApp/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: GeneratedModels/SiftSMSClassifier.mlmodel
      - path: GeneratedModels/SiftSMSClassifier.manifest.json
        buildPhase: resources
    dependencies:
      - target: SiftAppKit
      - target: MessageFilterCore
        embed: true
      - target: MessageFilterExtension
        embed: true
    settings:
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: PB8H83VL3Z
      PROVISIONING_PROFILE_SPECIFIER: ""
      CODE_SIGN_ENTITLEMENTS: SiftApp/SiftApp.entitlements
      PRODUCT_BUNDLE_IDENTIFIER: com.alkinum.sift
      GENERATE_INFOPLIST_FILE: NO
      INFOPLIST_FILE: SiftApp/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  MessageFilterExtension:
    type: app-extension
    platform: iOS
    sources:
      - MessageFilterExtension
      - path: GeneratedModels/SiftSMSClassifier.mlmodel
      - path: GeneratedModels/SiftSMSClassifier.manifest.json
        buildPhase: resources
    dependencies:
      - target: MessageFilterCore
        embed: true
      - target: MessageFilterExtensionKit
        embed: true
    settings:
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: PB8H83VL3Z
      PROVISIONING_PROFILE_SPECIFIER: ""
      CODE_SIGN_ENTITLEMENTS: MessageFilterExtension/MessageFilterExtension.entitlements
      PRODUCT_BUNDLE_IDENTIFIER: com.alkinum.sift.MessageFilterExtension
      GENERATE_INFOPLIST_FILE: NO
      INFOPLIST_FILE: MessageFilterExtension/Info.plist
